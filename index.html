<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodrigo Jr - Fotografia</title>

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background:#0f0f0f;
  color:white;
  line-height:1.6;
}
.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}
header{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.9));
}
header h1{
  font-size:60px;
  letter-spacing:3px;
  margin:0;
}
header p{
  opacity:.8;
  margin-top:10px;
}
nav{
  position:fixed;
  top:0;
  width:100%;
  background:#0f0f0f;
  border-bottom:1px solid #222;
}
nav .container{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 0;
}
nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-size:14px;
  opacity:.8;
}
section{
  padding:100px 0;
}
h2{
  font-size:32px;
  margin-bottom:30px;
}
.about{
  max-width:700px;
}
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}
.photo{
  background:#1b1b1b;
  height:350px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  opacity:.6;
}
.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}
.card{
  background:#1a1a1a;
  padding:30px;
  border-radius:8px;
}
.contact{
  text-align:center;
}
footer{
  border-top:1px solid #222;
  padding:40px;
  text-align:center;
  opacity:.6;
}
</style>
</head>

<body>

<nav>
<div class="container">
  <div><b>RODRIGO JR</b></div>
  <div>
    <a href="#about">Sobre</a>
    <a href="#portfolio">Portfólio</a>
    <a href="#services">Serviços</a>
    <a href="#contact">Contato</a>
  </div>
</div>
</nav>

<header>
<div>
  <h1 id="header-title">RODRIGO JR</h1>
  <p id="header-sub1">Fotografia Profissional</p>
  <p id="header-sub2">Esportes • Eventos • Retratos</p>
</div>
</header>

<section id="about">
<div class="container">
  <h2 id="about-title">Sobre</h2>
  <p class="about" id="about-text">Sou um fotógrafo iniciante movido pela paixão...</p>
</div>
</section>

<section id="portfolio">
<div class="container">
  <h2 id="portfolio-title">Portfólio</h2>
  <div class="gallery"></div>
</div>
</section>

<section id="services">
<div class="container">
  <h2 id="services-title">Serviços</h2>
  <div class="services">
    <div class="card"><h3></h3><p></p></div>
    <div class="card"><h3></h3><p></p></div>
    <div class="card"><h3></h3><p></p></div>
  </div>
</div>
</section>

<section id="contact">
<div class="container contact">
  <h2 id="contact-title">Contato</h2>
  <p id="contact-email">Email: </p>
  <p id="contact-instagram">Instagram: </p>
  <p id="contact-whatsapp">WhatsApp: </p>
</div>
</section>

<footer>
<p id="footer-text">© 2026 Rodrigo Jr Photography</p>
</footer>

<script>
fetch('content/home.json')
  .then(r => r.json())
  .then(data => {
    // Header
    document.getElementById('header-title').textContent = data.header.title;
    document.getElementById('header-sub1').textContent = data.header.subtitle1;
    document.getElementById('header-sub2').textContent = data.header.subtitle2;

    // About
    document.getElementById('about-title').textContent = data.about.title;
    document.getElementById('about-text').textContent = data.about.text;

    // Portfolio
    document.getElementById('portfolio-title').textContent = data.portfolio.title;
    const gallery = document.querySelector('.gallery');
    if (gallery) {
      gallery.innerHTML = '';
      data.portfolio.photos.forEach(photo => {
  const imgPath = typeof photo === "string" ? photo : photo.photo;

  const div = document.createElement('div');
  div.className = 'photo';
  div.innerHTML = `<img src="${imgPath}" alt="Foto" style="width:100%; height:100%; object-fit:contain; cursor:pointer;">`;

div.querySelector("img").onclick = () => {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = imgPath;
};
  gallery.appendChild(div);
});
    }

    // Services
    const serviceCards = document.querySelectorAll('.services .card');
    data.services.forEach((service, i) => {
      if (serviceCards[i]) {
        serviceCards[i].querySelector('h3').textContent = service.title;
        serviceCards[i].querySelector('p').textContent = service.text;
      }
    });

    // Contact
    document.getElementById('contact-title').textContent = data.contact.title;
    document.getElementById('contact-email').textContent = 'Email: ' + data.contact.email;
    document.getElementById('contact-instagram').textContent = 'Instagram: ' + data.contact.instagram;
    document.getElementById('contact-whatsapp').textContent = 'WhatsApp: ' + data.contact.whatsapp;

    // Footer
    document.getElementById('footer-text').textContent = data.footer.text;
  })
  .catch(error => {
    console.error("Erro carregando home.json:", error);
  });
</script>
<!-- Netlify Identity para confirmar email e login CMS -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      // Se o usuário acabou de confirmar email
      if (window.location.hash.includes("confirmation_token")) {
        window.netlifyIdentity.open();
      }

      // Após login, redireciona para o CMS
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
  <div id="lightbox" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:9999;
">
  <img id="lightbox-img" style="max-width:90%; max-height:90%;">
</div>

<script>
document.getElementById("lightbox").onclick = () => {
  document.getElementById("lightbox").style.display = "none";
};
</script>
</div>
</body>
</html>
