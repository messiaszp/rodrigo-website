backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "home"
    label: "Home"
    files:
      - file: "content/home.json"
        label: "Conteúdo Principal"
        name: "home_content"
        fields:

          - label: "Header"
            name: "header"
            widget: "object"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Subtítulo 1", name: "subtitle1", widget: "string" }
              - { label: "Subtítulo 2", name: "subtitle2", widget: "string" }

          - label: "Sobre"
            name: "about"
            widget: "object"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Texto", name: "text", widget: "text" }

          - label: "Portfólio"
            name: "portfolio"
            widget: "object"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - label: "Fotos"
                name: "photos"
                widget: "list"
                field:
                  label: "Foto"
                  name: "photo"
                  widget: "image"

          - label: "Serviços"
            name: "services"
            widget: "list"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Texto", name: "text", widget: "text" }

          - label: "Contato"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Instagram", name: "instagram", widget: "string" }
              - { label: "WhatsApp", name: "whatsapp", widget: "string" }

          - label: "Rodapé"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Texto", name: "text", widget: "string" }
